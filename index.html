<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolLink</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0e1621;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* ОКНО АВТОРИЗАЦИИ */
        .auth-container {
            background-color: #17212b;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 100;
        }

        .auth-container h2 {
            text-align: center;
            color: #fff;
            font-size: 26px;
            font-weight: bold;
        }

        .auth-container p {
            text-align: center;
            color: #7f91a4;
            font-size: 14px;
            margin-top: -10px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #24313f;
            background-color: #202b36;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #5288c1;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background-color: #5288c1;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            text-transform: uppercase;
        }

        .auth-btn:hover {
            background-color: #4372a3;
        }

        .toggle-auth {
            text-align: center;
            font-size: 14px;
            color: #5288c1;
            cursor: pointer;
            font-weight: 500;
        }

        .toggle-auth:hover {
            text-decoration: underline;
        }

        /* ИНТЕРФЕЙС ЧАТА */
        .tg-container {
            width: 100vw;
            height: 100vh;
            display: none;
            flex-direction: column;
            background-color: #0e1621;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
        }

        .chat-header {
            height: 60px;
            background-color: #17212b;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #101921;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .chat-header-details h3 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .chat-header-details p {
            font-size: 13px;
            color: #7f91a4;
            margin-top: 2px;
        }

        .tg-logout {
            background: none;
            border: none;
            color: #ee6060;
            font-size: 15px;
            cursor: pointer;
            font-weight: 500;
        }
        .tg-logout:hover { text-decoration: underline; }

        .chat-messages {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        .message {
            max-width: 65%;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.5;
            color: #f5f5f5;
            word-wrap: break-word;
            background-color: #182533;
            align-self: flex-start;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            border-bottom-left-radius: 4px;
        }

        .message .sender {
            font-size: 14px;
            color: #5288c1;
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }

        .message.my-message {
            background-color: #2b5278;
            align-self: flex-end;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 4px;
        }

        .message.my-message .sender {
            color: #8ac4ff;
        }

        /* ПАНЕЛЬ ВВОДА */
        .chat-input-bar {
            background-color: #17212b;
            border-top: 1px solid #101921;
            width: 100%;
            padding: 15px 24px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .chat-input-bar input {
            flex: 1;
            background: none;
            border: none;
            padding: 10px 0;
            font-size: 16px;
            color: #fff;
            outline: none;
        }

        .send-btn {
            background: none;
            border: none;
            color: #5288c1;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            padding: 10px;
            text-transform: uppercase;
        }

        /* КНОПКА И ОКНО СТИКЕРОВ */
        .sticker-wrapper {
            display: flex;
            align-items: center;
        }

        .sticker-toggle-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 5px;
            outline: none;
        }

        .sticker-panel {
            position: absolute;
            bottom: 70px;
            left: 24px;
            width: 320px;
            height: 320px;
            background-color: #17212b;
            border: 1px solid #24313f;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            z-index: 999;
        }

        .sticker-panel.hidden {
            display: none !important;
        }

        .sticker-tabs {
            display: flex;
            background-color: #101921;
            border-bottom: 1px solid #24313f;
        }

        .sticker-tab {
            padding: 12px 16px;
            color: #5288c1;
            background: none;
            border: none;
            font-size: 14px;
            font-weight: bold;
            text-align: left;
            width: 100%;
        }

        .sticker-list {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 12px;
            overflow-y: auto;
        }

        .sticker-item {
            width: 100%;
            aspect-ratio: 1;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .sticker-item:hover {
            transform: scale(1.1);
        }

        .chat-sticker-img {
            max-width: 130px;
            max-height: 130px;
            display: block;
            border-radius: 8px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="auth-screen" class="auth-container">
        <h2 id="auth-title">SchoolLink</h2>
        <p id="auth-subtitle">Войдите, чтобы начать общение</p>
        
        <input type="email" id="auth-email" placeholder="Электронная почта">
        <input type="password" id="auth-password" placeholder="Пароль">
        
        <div id="reg-fields" style="display: none; flex-direction: column; gap: 20px;">
            <input type="text" id="reg-nickname" placeholder="Ваш никнейм">
            <input type="number" id="reg-school" placeholder="Номер школы">
            <input type="text" id="reg-class" placeholder="Класс (например: 6-Г)">
        </div>

        <button id="auth-main-btn" class="auth-btn" onclick="handleAuthSubmit()">Войти</button>
        <div id="auth-toggle" class="toggle-auth" onclick="toggleAuthMode()">Создать аккаунт</div>
    </div>

    <!-- ЧАТ -->
    <div id="chat-screen" class="tg-container">
        <div class="chat-header">
            <div class="chat-header-details">
                <h3 id="chat-room-title">Чат класса</h3>
                <p id="chat-room-info">Школа: -- | Класс: --</p>
            </div>
            <div>
                <span id="user-display-name" style="font-size: 15px; color: #7f91a4; margin-right: 15px; font-weight: 500;"></span>
                <button class="tg-logout" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div class="chat-messages" id="chat-box"></div>
        
        <div class="chat-input-bar">
            <div class="sticker-wrapper">
                <button type="button" id="sticker-btn" class="sticker-toggle-btn">😀</button>
                
                <div id="sticker-panel" class="sticker-panel hidden">
                    <div id="sticker-tabs" class="sticker-tabs">
                        <div class="sticker-tab">MemePack</div>
                    </div>
                    <div id="sticker-list" class="sticker-list"></div>
                </div>
            </div>

            <input type="text" id="message-input" placeholder="Напишите сообщение..." onkeydown="if(event.key === 'Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApr1QKnLQ3puv3Z2HzvXzT-J8ZeE6-s94",
            authDomain: "schoollink-f6d30.firebaseapp.com",
            projectId: "schoollink-f6d30",
            storageBucket: "schoollink-f6d30.firebasestorage.app",
            messagingSenderId: "471958658890",
            appId: "1:471958658890:web:c0b396d370954601b46bb3",
            measurementId: "G-QKT7JXPXBD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Указываем ровно 1 стикер, который у тебя сейчас загружен на GitHub
        const totalStickersInPack = 1; 

        let currentUser = null;
        let userSchool = "";
        let userClass = "";
        let isSignUpMode = false; 
        let unsubscribeMessages = null;

        window.toggleAuthMode = function() {
            isSignUpMode = !isSignUpMode;
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const mainBtn = document.getElementById('auth-main-btn');
            const toggleText = document.getElementById('auth-toggle');
            const regFields = document.getElementById('reg-fields');

            if (isSignUpMode) {
                title.innerText = "Создать аккаунт";
                subtitle.innerText = "Заполните форму для регистрации";
                mainBtn.innerText = "Зарегистрироваться";
                toggleText.innerText = "Уже есть аккаунт? Войти";
                regFields.style.display = "flex";
            } else {
                title.innerText = "SchoolLink";
                subtitle.innerText = "Войдите, чтобы начать общение";
                mainBtn.innerText = "Войти";
                toggleText.innerText = "Создать аккаунт";
                regFields.style.display = "none";
            }
        }

        window.handleAuthSubmit = function() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;

            if (!email || !password) {
                alert("Заполните Email и Пароль!");
                return;
            }

            if (isSignUpMode) {
                const nickname = document.getElementById('reg-nickname').value.trim();
                const school = document.getElementById('reg-school').value.trim();
                const classNum = document.getElementById('reg-class').value.trim();

                if (!nickname || !school || !classNum) {
                    alert("Заполните все поля!");
                    return;
                }

                createUserWithEmailAndPassword(auth, email, password)
                    .then(async (userCredential) => {
                        const user = userCredential.user;
                        await updateProfile(user, { displayName: nickname });
                        await setDoc(doc(db, "users", user.uid), {
                            nickname: nickname,
                            school: school,
                            class: classNum
                        });
                    })
                    .catch((err) => alert("Ошибка: " + err.message));
            } else {
                signInWithEmailAndPassword(auth, email, password)
                    .catch((err) => alert("Ошибка входа: " + err.message));
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    userSchool = userDoc.data().school;
                    userClass = userDoc.data().class;
                }

                document.getElementById('user-display-name').innerText = user.displayName || "Ученик";
                document.getElementById('chat-room-title').innerText = `Чат ${userClass} класса`;
                document.getElementById('chat-room-info').innerText = `Школа №${userSchool} | Аккаунт: ${user.displayName || "Ученик"}`;
                
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                
                loadMessages();
                loadStickers(); 
            } else {
                currentUser = null;
                if (unsubscribeMessages) unsubscribeMessages();
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('chat-screen').style.display = 'none';
            }
        });

        window.logout = function() {
            signOut(auth);
        }

        window.sendMessage = async function() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (text === "" || !currentUser) return;

            await sendToFirebase(text);
            input.value = "";
        }

        async function sendToFirebase(messageContent) {
            if(!messageContent) return;
            try {
                await addDoc(collection(db, "messages"), {
                    text: messageContent,
                    userId: currentUser.uid,
                    senderName: currentUser.displayName || "Аноним",
                    school: userSchool,
                    class: userClass,
                    timestamp: serverTimestamp()
                });
            } catch (e) {
                console.error("Ошибка отправки:", e);
            }
        }

        function loadMessages() {
            if (unsubscribeMessages) unsubscribeMessages();

            const q = query(collection(db, "messages"));

            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = "";

                let messagesArray = [];
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.school === userSchool && data.class === userClass) {
                        messagesArray.push(data);
                    }
                });

                messagesArray.sort((a, b) => {
                    const timeA = a.timestamp ? a.timestamp.toMillis() : 0;
                    const timeB = b.timestamp ? b.timestamp.toMillis() : 0;
                    return timeA - timeB;
                });

                messagesArray.forEach((data) => {
                    if(!data.text) return;
                    
                    const msgDiv = document.createElement('div');
                    msgDiv.classList.add('message');

                    if (data.userId === currentUser.uid) {
                        msgDiv.classList.add('my-message');
                    }

                    let messageBody = data.text;
                    if (messageBody.startsWith('[sticker:') && messageBody.endsWith(']')) {
                        const stickerUrl = messageBody.replace('[sticker:', '').replace(']', '');
                        messageBody = `<img src="${stickerUrl}" class="chat-sticker-img" onerror="this.style.display='none'">`;
                    }

                    msgDiv.innerHTML = `<span class="sender">${data.senderName}</span>${messageBody}`;
                    chatBox.appendChild(msgDiv);
                });
                
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        // ЛОГИКА ОКНА СТИКЕРОВ
        const stickerBtn = document.getElementById('sticker-btn');
        const stickerPanel = document.getElementById('sticker-panel');
        const stickerList = document.getElementById('sticker-list');

        if (stickerBtn && stickerPanel) {
            stickerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                stickerPanel.classList.toggle('hidden');
            });
        }

        document.addEventListener('click', (e) => {
            if (stickerPanel && !stickerPanel.contains(e.target) && e.target !== stickerBtn) {
                stickerPanel.classList.add('hidden');
            }
        });

        function loadStickers() {
            if (!stickerList) return;
            stickerList.innerHTML = '';
            
            for (let i = 1; i <= totalStickersInPack; i++) {
                const img = document.createElement('img');
                // Относительный путь, чтобы картинка нормально считывалась на GitHub Pages
                const path = `Stickers/MemePack/${i}.png`;
                img.src = path;
                img.className = 'sticker-item';
                img.alt = `sticker-${i}`;
                
                img.addEventListener('click', () => {
                    sendToFirebase(`[sticker:${path}]`);
                    stickerPanel.classList.add('hidden');
                });
                
                stickerList.appendChild(img);
            }
        }
    </script>
</body>
</html>
