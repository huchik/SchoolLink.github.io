<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SchoolLink</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            background-color: #0e1621;
            color: #ffffff;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ОКНО АВТОРИЗАЦИИ */
        .auth-container {
            background-color: #17212b;
            padding: 30px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 166px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
            max-height: 90vh;
            overflow-y: auto;
        }

        .auth-container h2 {
            text-align: center;
            color: #fff;
            font-size: 26px;
            font-weight: bold;
        }

        .auth-container p {
            text-align: center;
            color: #7f91a4;
            font-size: 14px;
            margin-top: -5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #24313f;
            background-color: #202b36;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #5288c1;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background-color: #5288c1;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            text-transform: uppercase;
        }

        .auth-btn:hover {
            background-color: #4372a3;
        }

        .toggle-auth {
            text-align: center;
            font-size: 14px;
            color: #5288c1;
            cursor: pointer;
            font-weight: 500;
        }

        .toggle-auth:hover {
            text-decoration: underline;
        }

        /* ГЛАВНЫЙ ИНТЕРФЕЙС ПРИЛОЖЕНИЯ */
        .tg-container {
            width: 100%;
            height: 100%;
            display: none;
            background-color: #0e1621;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
        }

        /* БОКОВАЯ ПАНЕЛЬ С ОДНИМ ЧАТОМ КЛАССА */
        .sidebar {
            width: 72px;
            min-width: 72px;
            background-color: #101921;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 12px;
            overflow-y: auto;
            border-right: 1px solid #101921;
        }

        .sidebar::-webkit-scrollbar { display: none; }

        .chat-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background-color: #5288c1;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            cursor: default;
            border: 2px solid #fff;
        }

        /* ОСНОВНАЯ ЗОНА ЧАТА */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
            background-color: #0e1621;
            position: relative;
        }

        .chat-header {
            height: 60px;
            min-height: 60px;
            background-color: #17212b;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #101921;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .chat-header-left {
            display: flex;
            flex-direction: column;
        }

        .chat-header-details h3 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .chat-header-details p {
            font-size: 12px;
            color: #7f91a4;
            margin-top: 2px;
        }

        .tg-logout {
            background: none;
            border: none;
            color: #ee6060;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }
        .tg-logout:hover { text-decoration: underline; }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        /* СООБЩЕНИЯ */
        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 75%;
            align-self: flex-start;
        }

        .message-row.my-row {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #24313f;
            flex-shrink: 0;
        }

        .message {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.4;
            color: #f5f5f5;
            word-wrap: break-word;
            background-color: #182533;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            border-bottom-left-radius: 4px;
        }

        .message .sender {
            font-size: 13px;
            color: #5288c1;
            font-weight: bold;
            display: block;
            margin-bottom: 3px;
        }

        .message.my-message {
            background-color: #2b5278;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 4px;
        }

        .message.my-message .sender { color: #8ac4ff; }

        /* ПАНЕЛЬ ВВОДА */
        .chat-input-bar {
            background-color: #17212b;
            border-top: 1px solid #101921;
            width: 100%;
            padding: 10px 15px calc(15px + env(safe-area-inset-bottom));
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 65px;
        }

        .chat-input-bar input {
            flex: 1;
            background-color: #202b36;
            border: 1px solid #24313f;
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 15px;
            color: #fff;
        }

        .send-btn {
            background: none;
            border: none;
            color: #5288c1;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            padding: 5px;
        }

        /* СТИКЕРЫ */
        .sticker-wrapper { display: flex; align-items: center; }
        .sticker-toggle-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 5px; }
        
        .sticker-panel {
            position: absolute;
            bottom: 75px;
            left: 80px;
            width: 90vw;
            max-width: 320px;
            height: 280px;
            background-color: #17212b;
            border: 1px solid #24313f;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            z-index: 999;
        }

        .sticker-panel.hidden { display: none !important; }
        .sticker-tabs { display: flex; background-color: #101921; border-bottom: 1px solid #24313f; }
        .sticker-tab { padding: 10px 14px; color: #5288c1; font-size: 13px; font-weight: bold; }
        .sticker-list { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 10px; overflow-y: auto; }
        .sticker-item { width: 100%; aspect-ratio: 1; object-fit: contain; cursor: pointer; }
        .chat-sticker-img { max-width: 140px; max-height: 140px; width: 100%; height: auto; display: block; border-radius: 8px; margin-top: 4px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <h2 id="auth-title">SchoolLink</h2>
        <p id="auth-subtitle">Войдите, чтобы начать общение</p>
        
        <input type="email" id="auth-email" placeholder="Электронная почта">
        <input type="password" id="auth-password" placeholder="Пароль">
        
        <div id="reg-fields" style="display: none; flex-direction: column; gap: 15px;">
            <input type="text" id="reg-nickname" placeholder="Ваш никнейм">
            <input type="text" id="reg-avatar" placeholder="Ссылка на аватарку (необязательно)">
            <input type="text" id="reg-city" placeholder="Город (например: Волгоград)">
            <input type="number" id="reg-school" placeholder="Номер школы">
            <input type="text" id="reg-class" placeholder="Класс (например: 6-Г)">
        </div>

        <button id="auth-main-btn" class="auth-btn" onclick="handleAuthSubmit()">Войти</button>
        <div id="auth-toggle" class="toggle-auth" onclick="toggleAuthMode()">Создать аккаунт</div>
    </div>

    <div id="chat-screen" class="tg-container">
        
        <div class="sidebar" id="group-sidebar">
            <div id="btn-class-chat" class="chat-icon" title="Чат класса">КЛ</div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <div class="chat-header-left">
                    <div class="chat-header-details">
                        <h3 id="chat-room-title">Загрузка...</h3>
                        <p id="chat-room-info">Город: -- | Школа: --</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="tg-logout" onclick="logout()">Выйти</button>
                </div>
            </div>
            
            <div class="chat-messages" id="chat-box"></div>
            
            <div class="chat-input-bar">
                <div class="sticker-wrapper">
                    <button type="button" id="sticker-btn" class="sticker-toggle-btn">😀</button>
                    
                    <div id="sticker-panel" class="sticker-panel hidden">
                        <div class="sticker-tabs"><div class="sticker-tab">MemePack</div></div>
                        <div id="sticker-list" class="sticker-list"></div>
                    </div>
                </div>

                <input type="text" id="message-input" placeholder="Напишите сообщение..." onkeydown="if(event.key === 'Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">👉</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApr1QKnLQ3puv3Z2HzvXzT-J8ZeE6-s94",
            authDomain: "schoollink-f6d30.firebaseapp.com",
            projectId: "schoollink-f6d30",
            storageBucket: "schoollink-f6d30.firebasestorage.app",
            messagingSenderId: "471958658890",
            appId: "1:471958658890:web:c0b396d370954601b46bb3",
            measurementId: "G-QKT7JXPXBD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let userCity = "";
        let userSchool = "";
        let userClass = "";
        let userAvatarUrl = "";
        let isSignUpMode = false; 
        let unsubscribeMessages = null;

        const DEFAULT_AVATAR = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        window.toggleAuthMode = function() {
            isSignUpMode = !isSignUpMode;
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const mainBtn = document.getElementById('auth-main-btn');
            const toggleText = document.getElementById('auth-toggle');
            const regFields = document.getElementById('reg-fields');

            if (isSignUpMode) {
                title.innerText = "Создать аккаунт";
                subtitle.innerText = "Заполните форму для регистрации";
                mainBtn.innerText = "Зарегистрироваться";
                toggleText.innerText = "Уже есть аккаунт? Войти";
                regFields.style.display = "flex";
            } else {
                title.innerText = "SchoolLink";
                subtitle.innerText = "Войдите, чтобы начать общение";
                mainBtn.innerText = "Войти";
                toggleText.innerText = "Создать аккаунт";
                regFields.style.display = "none";
            }
        }

        window.handleAuthSubmit = function() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;

            if (!email || !password) {
                alert("Заполните Email и Пароль!");
                return;
            }

            if (isSignUpMode) {
                const nickname = document.getElementById('reg-nickname').value.trim();
                const avatar = document.getElementById('reg-avatar').value.trim();
                const city = document.getElementById('reg-city').value.trim();
                const school = document.getElementById('reg-school').value.trim();
                const classNum = document.getElementById('reg-class').value.trim();

                if (!nickname || !city || !school || !classNum) {
                    alert("Заполните все обязательные поля регистрации!");
                    return;
                }

                createUserWithEmailAndPassword(auth, email, password)
                    .then(async (userCredential) => {
                        const user = userCredential.user;
                        const finalAvatar = avatar || DEFAULT_AVATAR;

                        await updateProfile(user, { 
                            displayName: nickname,
                            photoURL: finalAvatar 
                        });

                        await setDoc(doc(db, "users", user.uid), {
                            nickname: nickname,
                            avatarUrl: finalAvatar,
                            city: String(city).trim(),
                            school: String(school).trim(),
                            class: String(classNum).trim()
                        });
                    })
                    .catch((err) => alert("Ошибка: " + err.message));
            } else {
                signInWithEmailAndPassword(auth, email, password)
                    .catch((err) => alert("Ошибка входа: " + err.message));
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    userCity = userDoc.data().city || "Не указан";
                    userSchool = userDoc.data().school;
                    userClass = userDoc.data().class;
                    userAvatarUrl = userDoc.data().avatarUrl || DEFAULT_AVATAR;
                } else {
                    userAvatarUrl = user.photoURL || DEFAULT_AVATAR;
                }

                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                
                // Настраиваем шапку и запускаем чтение сообщений
                document.getElementById('chat-room-title').innerText = `Чат ${userClass}`;
                document.getElementById('chat-room-info').innerText = `г. ${userCity} | Школа №${userSchool}`;
                
                loadMessages();
                autoLoadAllStickers();
            } else {
                currentUser = null;
                if (unsubscribeMessages) unsubscribeMessages();
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('chat-screen').style.display = 'none';
            }
        });

        window.logout = function() {
            signOut(auth);
        }

        window.sendMessage = async function() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (text === "" || !currentUser) return;

            await sendToFirebase(text);
            input.value = "";
        }

        async function sendToFirebase(messageContent) {
            if(!messageContent) return;
            try {
                await addDoc(collection(db, "messages"), {
                    text: messageContent,
                    userId: currentUser.uid,
                    senderName: currentUser.displayName || "Аноним",
                    avatarUrl: userAvatarUrl,
                    city: String(userCity).trim(),
                    school: String(userSchool).trim(),
                    class: String(userClass).toLowerCase().trim(),
                    timestamp: serverTimestamp()
                });
            } catch (e) {
                console.error("Ошибка отправки:", e);
            }
        }

        function loadMessages() {
            if (unsubscribeMessages) unsubscribeMessages();

            const q = query(collection(db, "messages"));

            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = "";

                let messagesArray = [];
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    const dbSchool = String(data.school).trim();
                    const mySchool = String(userSchool).trim();
                    const dbClass = String(data.class).toLowerCase().trim();
                    const myClass = String(userClass).toLowerCase().trim();

                    // Фильтруем: только сообщения из той же школы и того же класса
                    if (dbSchool === mySchool && dbClass === myClass) {
                        messagesArray.push(data);
                    }
                });

                // Сортировка по времени
                messagesArray.sort((a, b) => {
                    const timeA = a.timestamp ? a.timestamp.toMillis() : 0;
                    const timeB = b.timestamp ? b.timestamp.toMillis() : 0;
                    return timeA - timeB;
                });

                // Отрисовка
                messagesArray.forEach((data) => {
                    if(!data.text) return;
                    
                    const rowDiv = document.createElement('div');
                    rowDiv.classList.add('message-row');

                    const msgDiv = document.createElement('div');
                    msgDiv.classList.add('message');

                    if (data.userId === currentUser.uid) {
                        rowDiv.classList.add('my-row');
                        msgDiv.classList.add('my-message');
                    }

                    let messageBody = data.text;
                    if (messageBody.startsWith('[sticker:') && messageBody.endsWith(']')) {
                        const stickerUrl = messageBody.replace('[sticker:', '').replace(']', '');
                        messageBody = `<img src="${stickerUrl}" class="chat-sticker-img" onerror="this.style.display='none'">`;
                    }
                    
                    msgDiv.innerHTML = `<span class="sender">${data.senderName}</span>${messageBody}`;
                    
                    const msgAvatarUrl = data.avatarUrl || DEFAULT_AVATAR;
                    const avatarImg = `<img src="${msgAvatarUrl}" class="user-avatar" onerror="this.src='${DEFAULT_AVATAR}'">`;

                    rowDiv.innerHTML = avatarImg;
                    rowDiv.appendChild(msgDiv);
                    
                    chatBox.appendChild(rowDiv);
                });
                
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        // Стикер-панель
        const stickerBtn = document.getElementById('sticker-btn');
        const stickerPanel = document.getElementById('sticker-panel');
        const stickerList = document.getElementById('sticker-list');

        if (stickerBtn && stickerPanel) {
            stickerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                stickerPanel.classList.toggle('hidden');
            });
        }

        document.addEventListener('click', (e) => {
            if (stickerPanel && !stickerPanel.contains(e.target) && e.target !== stickerBtn) {
                stickerPanel.classList.add('hidden');
            }
        });

        window.sendToFirebaseExternal = function(path) {
            sendToFirebase(path);
        }

        function autoLoadAllStickers() {
            if (!stickerList) return;
            stickerList.innerHTML = '';
            
            let index = 1;

            function checkNextSticker() {
                const path = `Stickers/MemePack/${index}.png`;
                const img = new Image();
                
                img.onload = function() {
                    const stickerImg = document.createElement('img');
                    stickerImg.src = path;
                    stickerImg.className = 'sticker-item';
                    stickerImg.alt = `sticker-${index}`;
                    
                    stickerImg.addEventListener('click', () => {
                        sendToFirebaseExternal(`[sticker:${path}]`);
                        stickerPanel.classList.add('hidden');
                    });
                    
                    stickerList.appendChild(stickerImg);
                    
                    index++;
                    checkNextSticker();
                };
                
                img.onerror = function() {
                    console.log(`Загрузка стикеров завершена.`);
                };
                
                img.src = path;
            }

            checkNextSticker();
        }
    </script>
</body>
</html>
