<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolLink Messenger</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        /* Основные стили интерфейса */
        body { background-color: #0e1621; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h1 { font-size: 22px; color: #5288c1; margin-bottom: 5px; }
        p { color: #7f91a4; margin-top: 0; font-size: 14px; }
        
        /* Главное окно общего чата */
        #chat-window { width: 90%; max-width: 500px; height: 500px; background-color: #17212b; border: 1px solid #24313f; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Сообщения в общем чате */
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; word-wrap: break-word; font-size: 15px; background: #182533; align-self: flex-start; }
        .user-name { color: #5288c1; font-weight: bold; font-size: 13px; display: block; margin-bottom: 2px; cursor: pointer; }
        .user-name:hover { text-decoration: underline; }
        
        /* Панель ввода */
        .input-bar { display: flex; padding: 10px; background-color: #17212b; border-top: 1px solid #101921; gap: 8px; }
        input { flex: 1; background-color: #202b36; border: 1px solid #24313f; border-radius: 20px; padding: 10px 15px; color: white; outline: none; font-size: 15px; }
        input:focus { border-color: #5288c1; }
        button { background: none; border: none; color: #5288c1; font-size: 18px; font-weight: bold; cursor: pointer; padding: 0 10px; }

        /* МАКЕТ ИЗ РИСУНКА: Маленькое приватное окошко (ЛС) */
        #private-chat-window { 
            display: none; /* Изначально скрыто */
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            width: 280px; 
            height: 380px; 
            background-color: #17212b; 
            border: 2px solid #5288c1; 
            border-radius: 12px; 
            flex-direction: column; 
            z-index: 1000; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.6); 
        }
        #private-messages { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; font-size: 14px; }
        
        /* Стили сообщений внутри лички */
        .p-msg { padding: 6px 10px; border-radius: 8px; max-width: 85%; word-break: break-word; }
        .my-p-msg { background-color: #2b5278; align-self: flex-end; }
        .alien-p-msg { background-color: #202b36; align-self: flex-start; }
    </style>
</head>
<body>

    <h1>SchoolLink</h1>
    <p>Нажми на имя любого чела в чате, чтобы открыть личку</p>
    
    <div id="chat-window">
        <div id="messages"></div>
        <div class="input-bar">
            <input type="text" id="msg-input" placeholder="Напишите в общий чат..." onkeydown="if(event.key === 'Enter') sendGlobalMessage()">
            <button onclick="sendGlobalMessage()">👉</button>
        </div>
    </div>

    <div id="private-chat-window">
        <div style="background-color: #202b36; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #24313f; border-top-left-radius: 10px; border-top-right-radius: 10px;">
            <span id="private-chat-title" style="color: #5288c1; font-weight: bold; font-size: 14px;">Чат с...</span>
            <button onclick="closePrivateChat()" style="background: none; border: none; color: #ee6060; cursor: pointer; font-size: 16px; padding: 0;">✕</button>
        </div>
        <div id="private-messages"></div>
        <div style="display: flex; padding: 8px; background-color: #17212b; border-top: 1px solid #101921; gap: 5px;">
            <input type="text" id="private-msg-input" placeholder="ЛС сообщение..." onkeydown="if(event.key === 'Enter') sendPrivateMessage()">
            <button onclick="sendPrivateMessage()" style="font-size: 16px;">👉</button>
        </div>
    </div>

    <script>
        // --- НАСТРОЙКА FIREBASE ---
        // Вставь сюда свои конфиги от старого проекта!
        const firebaseConfig = {
            apiKey: "ТВОЙ_API_KEY",
            authDomain: "ТВОЙ_AUTH_DOMAIN",
            projectId: "ТВОЙ_PROJECT_ID",
            storageBucket: "ТВОЙ_STORAGE_BUCKET",
            messagingSenderId: "ТВОЙ_MESSAGING_SENDER_ID",
            appId: "ТВОЙ_APP_ID"
        };

        // Инициализация
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let myUid = null;
        let myName = null;
        let currentPrivateChatUserId = null;
        let privateChatListener = null;

        // Автоматический вход (чтобы не писать форму регистрации для тестов)
        auth.onAuthStateChanged((user) => {
            if (user) {
                myUid = user.uid;
                myName = user.displayName || "Аноним_" + myUid.substr(0, 3);
                loadGlobalMessages(); // Запускаем общий чат
            } else {
                // Если не залогинен, создаем временного юзера
                auth.signInAnonymously().then((result) => {
                    const tempName = "User_" + Math.random().toString(36).substr(2, 4);
                    result.user.updateProfile({ displayName: tempName });
                });
            }
        });

        // --- ЛОГИКА ОБЩЕГО ЧАТА ---
        function loadGlobalMessages() {
            db.collection("global_chat").orderBy("timestamp", "asc").limit(50)
                .onSnapshot((snapshot) => {
                    const msgBox = document.getElementById("messages");
                    msgBox.innerHTML = "";
                    
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        const div = document.createElement("div");
                        div.className = "msg";
                        
                        // Добавляем кликабельное имя юзера (вызывает openPrivateChat)
                        div.innerHTML = `<span class="user-name" onclick="openPrivateChat('${data.userId}', '${data.userName}')">${data.userName}</span>${data.text}`;
                        msgBox.appendChild(div);
                    });
                    msgBox.scrollTop = msgBox.scrollHeight;
                });
        }

        function sendGlobalMessage() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (text === "" || !myUid) return;

            db.collection("global_chat").add({
                userId: myUid,
                userName: myName,
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = "";
        }

        // --- ФУНКЦИЯ ИЗ ТВОЕГО РИСУНКА: ОТКРЫТИЕ ЛИЧКИ ПРИ КЛИКЕ ---
        function openPrivateChat(targetUserId, targetUserName) {
            // Если тыкнул на самого себя — ничего не делаем
            if (targetUserId === myUid) return;

            currentPrivateChatUserId = targetUserId;
            
            // Показываем маленькое окошко
            const pWindow = document.getElementById("private-chat-window");
            pWindow.style.display = "flex";
            document.getElementById("private-chat-title").innerText = `Чат с ${targetUserName}`;
            
            const pMessagesContainer = document.getElementById("private-messages");
            pMessagesContainer.innerHTML = "";

            // Создаем уникальный ID комнаты для двоих (сортируем ID, чтобы он всегда совпадал у вас обоих)
            const chatId = myUid < targetUserId ? `${myUid}_${targetUserId}` : `${targetUserId}_${myUid}`;

            // Если уже была открыта другая личка, отписываемся от старой
            if (privateChatListener) privateChatListener();

            // Подгружаем сообщения лички в реальном времени
            privateChatListener = db.collection("private_chats").doc(chatId).collection("messages")
                .orderBy("timestamp", "asc")
                .onSnapshot((snapshot) => {
                    pMessagesContainer.innerHTML = "";
                    snapshot.forEach((doc) => {
                        const msg = doc.data();
                        const div = document.createElement("div");
                        
                        // Проверяем кто отправитель и выставляем нужный стиль
                        if (msg.senderId === myUid) {
                            div.className = "p-msg my-p-msg";
                        } else {
                            div.className = "p-msg alien-p-msg";
                        }
                        
                        div.innerText = msg.text;
                        pMessagesContainer.appendChild(div);
                    });
                    pMessagesContainer.scrollTop = pMessagesContainer.scrollHeight;
                });
        }

        // Отправка сообщений в личку
        function sendPrivateMessage() {
            const input = document.getElementById("private-msg-input");
            const text = input.value.trim();
            if (text === "" || !currentPrivateChatUserId) return;

            const chatId = myUid < currentPrivateChatUserId ? `${myUid}_${currentPrivateChatUserId}` : `${currentPrivateChatUserId}_${myUid}`;

            db.collection("private_chats").doc(chatId).collection("messages").add({
                senderId: myUid,
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            input.value = "";
        }

        // Закрытие маленького окошка
        function closePrivateChat() {
            document.getElementById("private-chat-window").style.display = "none";
            if (privateChatListener) {
                privateChatListener(); // Выключаем прослушивание бд для экономии
                privateChatListener = null;
            }
            currentPrivateChatUserId = null;
        }
    </script>
</body>
</html>
