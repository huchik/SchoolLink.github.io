<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SchoolLink</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            background-color: #0e1621;
            color: #ffffff;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ОКНО АВТОРИЗАЦИИ */
        .auth-container {
            background-color: #17212b;
            padding: 30px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 380px;
            display: flex;\n            flex-direction: column;\n            gap: 15px;
        }

        .auth-container h2 {
            text-align: center;
            color: #5288c1;
            margin-bottom: 5px;
        }

        .auth-container input, .auth-container select {
            width: 100%;
            padding: 12px;
            background-color: #24313f;
            border: 1px solid #2f4356;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .auth-container button {
            width: 100%;
            padding: 12px;
            background-color: #5288c1;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .auth-container button:hover {
            background-color: #4374a5;
        }

        .auth-switch {
            text-align: center;
            font-size: 13px;
            color: #7f91a4;
            cursor: pointer;
            text-decoration: underline;
        }

        /* ГЛАВНЫЙ ИНТЕРФЕЙС ЧАТА */
        .app-container {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            position: relative;
        }

        /* ШАПКА КАНАЛА */
        .chat-header {
            background-color: #17212b;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #101924;
            height: 56px;
            z-index: 10;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
        }

        .header-text h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .header-text p {
            font-size: 12px;
            color: #7f91a4;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            font-size: 20px;
            cursor: pointer;
        }

        /* ОКНО СООБЩЕНИЙ */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #0e1621;
        }

        /* ЭЛЕМЕНТ СООБЩЕНИЯ */
        .message-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            max-width: 85%;
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            background-color: #24313f;
        }

        .message-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .message-username {
            font-size: 12px;
            font-weight: 600;
            color: #5288c1;
            cursor: pointer;
        }

        .message-bubble {
            background-color: #182533;
            padding: 8px 12px;
            border-radius: 12px;
            border-bottom-left-radius: 2px;
            font-size: 14.5px;
            line-height: 1.4;
            word-break: break-word;
            position: relative;
        }

        .message-time {
            font-size: 10px;
            color: #7f91a4;
            float: right;
            margin-top: 5px;
            margin-left: 8px;
        }

        .chat-user-img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 4px;
            cursor: pointer;
        }

        /* СТИЛЬ ПЛЕЕРА ГОЛОСОВЫХ */
        .voice-player {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 8px;
            min-width: 170px;
        }

        .voice-player button {
            background: #5288c1;
            border: none;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ПАНЕЛЬ ВВОДА */
        .chat-input-bar {
            background-color: #17212b;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #101924;
            height: 56px;
        }

        .media-toggle-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #7f91a4;
            outline: none;
        }

        .media-toggle-btn.recording {
            color: #ee6060;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.4; }
        }

        .chat-input-bar input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .send-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #5288c1;
            outline: none;
        }

        /* ВСПЛЫВАЮЩИЕ ОКНА (ОКНО ЛС И НАСТРОЕК) */
        #pop-private-chat {
            display: none;
            position: absolute;
            bottom: 65px;
            right: 15px;
            width: 280px;
            height: 360px;
            background-color: #17212b;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            z-index: 100;
            flex-direction: column;
            border: 1px solid #24313f;
        }

        #pop-messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-color: #0e1621;
        }

        .pop-msg {
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 13px;
            max-width: 85%;
            word-break: break-word;
        }

        .pop-msg.me {
            background-color: #2b5278;
            align-self: flex-end;
        }

        .pop-msg.other {
            background-color: #182533;
            align-self: flex-start;
        }

        /* НАСТРОЙКИ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 150;
            justify-content: center;
            align-items: center;
        }

        .settings-card {
            background-color: #17212b;
            width: 90%;
            max-width: 360px;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .settings-card h3 {
            color: #5288c1;
            text-align: center;
            margin-bottom: 5px;
        }

        .settings-card input {
            width: 100%;
            padding: 10px;
            background: #24313f;
            border: 1px solid #2f4356;
            border-radius: 6px;
            color: white;
            outline: none;
        }

        .avatar-select-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 5px 0;
        }

        .avatar-option {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .avatar-option.selected {
            border-color: #5288c1;
        }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <h2 id="auth-title">Вход в SchoolLink</h2>
        <input type="email" id="auth-email" placeholder="Электронная почта">
        <input type="password" id="auth-password" placeholder="Пароль">
        
        <div id="reg-fields" style="display: none; flex-direction: column; gap: 15px;">
            <input type="text" id="reg-nickname" placeholder="Ваш никнейм">
            <input type="text" id="reg-city" placeholder="Город">
            <input type="text" id="reg-school" placeholder="Школа / Лицей">
            <input type="text" id="reg-class" placeholder="Класс (например, 5-А)">
        </div>

        <button id="auth-submit-btn">Войти</button>
        <p id="auth-switch-mode" class="auth-switch">Нет аккаунта? Зарегистрироваться</p>
    </div>

    <div id="app-screen" class="app-container">
        <div class="chat-header">
            <div class="header-info">
                <img src="logo.png" class="header-logo" alt="SchoolLink">
                <div class="header-text">
                    <h3>Общий канал чата</h3>
                    <p id="user-profile-sub">Загрузка профиля...</p>
                </div>
            </div>
            <div class="header-actions">
                <span onclick="openSettingsModal()">⚙️</span>
                <span id="logout-btn-header">🚪</span>
            </div>
        </div>

        <div id="messages-box" class="messages-container"></div>

        <div id="pop-private-chat">
            <div style="background-color: #202b36; padding: 6px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #24313f; border-top-left-radius: 8px; border-top-right-radius: 8px;">
                <span id="pop-chat-title" style="color: #5288c1; font-weight: bold; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px;">Личка</span>
                <div style="display: flex; gap: 6px; align-items: center;">
                    <button onclick="reportUser()" style="background: none; border: none; color: #ee6060; cursor: pointer; font-size: 11px; padding: 2px 4px; border: 1px solid #ee6060; border-radius: 4px;">⚠️ Репорт</button>
                    <button onclick="closePopChat()" style="background: none; border: none; color: #7f91a4; cursor: pointer; font-size: 14px; padding: 0;">✕</button>
                </div>
            </div>
            <div id="pop-messages"></div>
            <div style="padding: 6px; background-color: #17212b; display: flex; gap: 6px; border-top: 1px solid #24313f; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px;">
                <input type="text" id="pop-input" placeholder="ЛС..." style="flex:1; background:#24313f; border:none; border-radius:4px; padding:6px; color:white; font-size:13px; outline:none;" onkeydown="if(event.key === 'Enter') sendPopMessage()">
                <button onclick="sendPopMessage()" style="background:none; border:none; color:#5288c1; font-size:16px; cursor:pointer;">👉</button>
            </div>
        </div>

        <div class="chat-input-bar">
            <button type="button" id="voice-btn" class="media-toggle-btn" style="user-select: none;">🎤</button>
            <input type="file" id="img-file-input" accept="image/*" style="display: none;">
            <button class="media-toggle-btn" onclick="document.getElementById('img-file-input').click()">🖼️</button>
            <input type="text" id="message-input" placeholder="Напишите сообщение..." onkeydown="if(event.key === 'Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">👉</button>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay">
        <div class="settings-card">
            <h3>Настройки профиля</h3>
            <label style="font-size: 12px; color: #7f91a4;">Выберите аватарку:</label>
            <div class="avatar-select-grid" id="avatar-grid-container"></div>
            
            <input type="text" id="set-nickname" placeholder="Никнейм">
            <input type="text" id="set-city" placeholder="Город">
            <input type="text" id="set-school" placeholder="Школа">
            <input type="text" id="set-class" placeholder="Класс">
            
            <div style="display: flex; gap: 10px; margin-top: 5px;">
                <button onclick="closeSettingsModal()" style="flex:1; padding:10px; background:#24313f; color:white; border:none; border-radius:6px; cursor:pointer;">Отмена</button>
                <button id="save-settings-btn" onclick="saveProfileSettings()" style="flex:1; padding:10px; background:#5288c1; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">Сохранить</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        // КОНФИГУРАЦИЯ ТВОЕГО ПРОЕКТА FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDE8_S8U6Xz9w0lZpXmK_vY1wXm4V3W3uI",
            authDomain: "schoollink-f6d30.firebaseapp.com",
            projectId: "schoollink-f6d30",
            storageBucket: "schoollink-f6d30.firebasestorage.app",
            messagingSenderId: "59495738520",
            appId: "1:59495738520:web:ee611ef43fa0a38210419a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app); // Подключили хранилище для звука

        let currentUser = null;
        let isSignUpMode = false;
        let currentPrivateChatUserId = null;
        let privateUnsubscribe = null;

        const DEFAULT_AVATAR = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        const AVATARS_LIST = [
            "https://cdn-icons-png.flaticon.com/512/4140/4140037.png",
            "https://cdn-icons-png.flaticon.com/512/4140/4140048.png",
            "https://cdn-icons-png.flaticon.com/512/4140/4140061.png",
            "https://cdn-icons-png.flaticon.com/512/4139/4139981.png",
            "https://cdn-icons-png.flaticon.com/512/1154/1154448.png",
            "https://cdn-icons-png.flaticon.com/512/1154/1154460.png",
            "https://cdn-icons-png.flaticon.com/512/1154/1154474.png",
            "https://cdn-icons-png.flaticon.com/512/1154/1154452.png"
        ];
        let selectedAvatarUrl = "";

        // ПЕРЕКЛЮЧЕНИЕ РЕЖИМА ВХОД / РЕГИСТРАЦИЯ
        const authSwitch = document.getElementById('auth-switch-mode');
        authSwitch.addEventListener('click', () => {
            isSignUpMode = !isSignUpMode;
            document.getElementById('reg-fields').style.display = isSignUpMode ? 'flex' : 'none';
            document.getElementById('auth-title').innerText = isSignUpMode ? 'Регистрация в SchoolLink' : 'Вход в SchoolLink';
            document.getElementById('auth-submit-btn').innerText = isSignUpMode ? 'Создать аккаунт' : 'Войти';
            authSwitch.innerText = isSignUpMode ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Зарегистрироваться';
        });

        // КНОПКА ОТПРАВКИ ФОРМЫ ВХОДА
        document.getElementById('auth-submit-btn').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();

            if(!email || !password) {
                alert("Заполните почту и пароль!");
                return;
            }

            if(isSignUpMode) {
                const nickname = document.getElementById('reg-nickname').value.trim();
                const city = document.getElementById('reg-city').value.trim();
                const school = document.getElementById('reg-school').value.trim();
                const cls = document.getElementById('reg-class').value.trim();

                if(!nickname || !city || !school || !cls) {
                    alert("Заполните все данные для регистрации!");
                    return;
                }

                try {
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(cred.user, { displayName: nickname, photoURL: DEFAULT_AVATAR });
                    
                    await setDoc(doc(db, "users", cred.user.uid), {
                        nickname: nickname,
                        avatarUrl: DEFAULT_AVATAR,
                        city: city,
                        school: school,
                        class: cls,
                        uid: cred.user.uid
                    });
                } catch(err) {
                    alert("Ошибка создания профиля: " + err.message);
                }
            } else {
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                } catch(err) {
                    alert("Ошибка входа: " + err.message);
                }
            }
        });

        // СЛЕЖКА ЗА СОСТОЯНИЕМ ПОЛЬЗОВАТЕЛЯ
        onAuthStateChanged(auth, async (user) => {
            if(user) {
                currentUser = user;
                await fetchAndApplyUserData();
            } else {
                currentUser = null;
                document.getElementById('app-screen').style.display = 'none';
                document.getElementById('auth-screen').style.display = 'flex';
                if(privateUnsubscribe) privateUnsubscribe();
            }
        });

        // ПРОВЕРКА ПРОФИЛЯ (И ПРОВЕРКА НА НАШ БАН С ПОМОЩЬЮ 5 РЕПОРТОВ)
        async function fetchAndApplyUserData() {
            if(!currentUser) return;

            // НАША СИСТЕМА БАНА
            const banDoc = await getDoc(doc(db, "banned_users", currentUser.uid));
            if (banDoc.exists() && banDoc.data().banned === true) {
                alert("Вы были навсегда заблокированы в мессенджере SchoolLink по решению сообщества (набрано 5/5 жалоб)!");
                logout();
                return;
            }

            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            if(userDoc.exists()) {
                const data = userDoc.data();
                document.getElementById('user-profile-sub').innerText = `${data.nickname} • ${data.class}, ${data.school} (${data.city})`;
                document.getElementById('app-screen').style.display = 'flex';
                document.getElementById('auth-screen').style.display = 'none';
                loadMessages();
            }
        }

        // ВЫХОД
        function logout() {
            signOut(auth);
        }
        document.getElementById('logout-btn-header').addEventListener('click', logout);

        // ОБЩИЙ ЧАТ — ЗАГРУЗКА И ВЫВОД СООБЩЕНИЙ
        function loadMessages() {
            const q = query(collection(db, "messages"));
            onSnapshot(q, (snapshot) => {
                const mBox = document.getElementById('messages-box');
                mBox.innerHTML = "";
                
                let sortedDocs = [];
                snapshot.forEach(d => sortedDocs.push({id: d.id, ...d.data()}));
                sortedDocs.sort((a,b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));

                sortedDocs.forEach(data => {
                    const row = document.createElement('div');
                    row.className = "message-row";

                    let timeStr = "";
                    if(data.timestamp) {
                        const date = new Date(data.timestamp.seconds * 1000);
                        timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    }

                    let messageBody = data.text || "";

                    // Обработка картинок
                    if (messageBody.startsWith('[image:') && messageBody.endsWith(']')) {
                        const imgUrl = messageBody.replace('[image:', '').replace(']', '');
                        messageBody = `<img src="${imgUrl}" class="chat-user-img" onclick="window.open('${imgUrl}', '_blank')">`;
                    }
                    // НАША КРУТАЯ СИСТЕМА ГОЛОСОВЫХ В ИНТЕРФЕЙСЕ
                    else if (messageBody.startsWith('[voice:') && messageBody.endsWith(']')) {
                        const voiceUrl = messageBody.replace('[voice:', '').replace(']', '');
                        messageBody = `
                            <div class="voice-player">
                                <button type="button" onclick="let a=this.nextElementSibling; if(a.paused){a.play(); this.innerText='\u23F8'}else{a.pause(); this.innerText='\u25B6'}">\u25B6</button>
                                <audio src="${voiceUrl}" onended="this.previousElementSibling.innerText='\u25B6'"></audio>
                                <span style="font-size: 11px; color: #7f91a4; user-select:none;">Голосовое сообщение</span>
                            </div>
                        `;
                    }

                    row.innerHTML = `
                        <img src="${data.avatarUrl || DEFAULT_AVATAR}" class="user-avatar" onclick="window.openPrivateChat('${data.userId}', '${data.username}')">
                        <div class="message-block">
                            <span class="message-username" onclick="window.openPrivateChat('${data.userId}', '${data.username}')">${data.username}</span>
                            <div class="message-bubble">
                                <div>${messageBody}</div>
                                <span class="message-time">${timeStr}</span>
                            </div>
                        </div>
                    `;
                    mBox.appendChild(row);
                });
                mBox.scrollTop = mBox.scrollHeight;
            });
        }

        // ОТПРАВКА СТАНДАРТНОГО ТЕКСТА В FIREBASE
        async function sendToFirebase(textValue) {
            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            if(!userDoc.exists()) return;
            const uData = userDoc.data();

            await addDoc(collection(db, "messages"), {
                text: textValue,
                userId: currentUser.uid,
                username: uData.nickname,
                avatarUrl: uData.avatarUrl || DEFAULT_AVATAR,
                timestamp: serverTimestamp()
            });
        }

        window.sendMessage = async function() {
            const inp = document.getElementById('message-input');
            const txt = inp.value.trim();
            if(!txt) return;
            inp.value = "";
            await sendToFirebase(txt);
        };

        // НАША КРУТАЯ СКРИПТОВАЯ ЧАСТЬ ЗАПИСИ ГОЛОСОВЫХ (БЕЗ ЗВОНКОВ)
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        const voiceBtn = document.getElementById('voice-btn');

        voiceBtn.addEventListener('click', async () => {
            if (!currentUser) return;

            if (!isRecording) {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert("Микрофон не поддерживается вашим устройством или оболочкой WebView.");
                    return;
                }

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        
                        const inputField = document.getElementById('message-input');
                        const oldPlaceholder = inputField.placeholder;
                        inputField.placeholder = "🎤 Голосовое отправляется...";
                        inputField.disabled = true;

                        try {
                            // Сохраняем прямо в твой Storage Firebase
                            const fileRef = ref(storage, `voice_notes/${Date.now()}.mp3`);
                            await uploadBytes(fileRef, audioBlob);
                            const downloadUrl = await getDownloadURL(fileRef);

                            await sendToFirebase(`[voice:${downloadUrl}]`);
                        } catch (err) {
                            console.error(err);
                            alert("Не удалось отправить файл звука.");
                        } finally {
                            inputField.placeholder = oldPlaceholder;
                            inputField.disabled = false;
                        }

                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    voiceBtn.classList.add('recording');
                    voiceBtn.innerText = '🛑';
                } catch (err) {
                    alert("Пожалуйста, предоставьте доступ к микрофону!");
                }
            } else {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
                isRecording = false;
                voiceBtn.classList.remove('recording');
                voiceBtn.innerText = '🎤';
            }
        });

        // ЗАГРУЗКА КАРТИНОК КЛИЕНТОМ ЧЕРЕЗ IMGBB
        document.getElementById('img-file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            const formData = new FormData();
            formData.append('image', file);

            try {
                document.getElementById('message-input').placeholder = "🖼️ Загрузка картинки...";
                const res = await fetch('https://api.imgbb.com/1/upload?key=638fdf28e211f62b083b708cf7eb904d', {
                    method: 'POST',
                    body: formData
                });
                const json = await res.json();
                if(json.success) {
                    await sendToFirebase(`[image:${json.data.url}]`);
                } else {
                    alert("Не удалось залить картинку на сервер.");
                }
            } catch(err) {
                alert("Ошибка соединения с ImgBB.");
            } finally {
                document.getElementById('message-input').placeholder = "Напишите сообщение...";
                e.target.value = "";
            }
        });

        // НАШ ТАНДЕМНЫЙ МЕХАНИЗМ РЕПОРТОВ И УДАЛЕНИЯ ХУЛИГАНОВ
        window.reportUser = async function() {
            if (!currentUser || !currentPrivateChatUserId) return;
            if (currentPrivateChatUserId === currentUser.uid) return; // На себя слать репорт нельзя

            if (!confirm("Пожаловаться на пользователя? Если он наберёт 5 жалоб, его выкинет из приложения навсегда.")) {
                return;
            }

            const reportId = `${currentUser.uid}_на_${currentPrivateChatUserId}`;
            
            try {
                // Добавляем репорт в отдельную таблицу
                await setDoc(doc(db, "reports", reportId), {
                    from: currentUser.uid,
                    targetId: currentPrivateChatUserId,
                    timestamp: serverTimestamp()
                });

                alert("Жалоба принята!");
                closePopChat();

                // Вызываем моментальную проверку счетчика жалоб
                checkIfUserShouldBeBanned(currentPrivateChatUserId);
            } catch (e) {
                console.error(e);
            }
        };

        async function checkIfUserShouldBeBanned(targetUserId) {
            try {
                const q = query(collection(db, "reports"));
                onSnapshot(q, async (snapshot) => {
                    let count = 0;
                    snapshot.forEach((doc) => {
                        if (doc.data().targetId === targetUserId) {
                            count++;
                        }
                    });

                    // Порог в 5 жалоб преодолён — отправляем в вечный бан!
                    if (count >= 5) {
                        await setDoc(doc(db, "banned_users", targetUserId), {
                            banned: true,
                            bannedAt: serverTimestamp()
                        });
                        console.log(`Пользователь ${targetUserId} заблокирован.`);
                    }
                });
            } catch (e) {
                console.error(e);
            }
        }

        // ЛОГИКА ОТКРЫТИЯ ВСПЛЫВАЮЩЕЙ ЛИЧКИ (ЛС)
        window.openPrivateChat = function(targetUid, targetName) {
            if(!currentUser || targetUid === currentUser.uid) return;
            
            currentPrivateChatUserId = targetUid;
            document.getElementById('pop-chat-title').innerText = `Личка: ${targetName}`;
            document.getElementById('pop-private-chat').style.display = 'flex';

            if(privateUnsubscribe) privateUnsubscribe();

            const chatId = currentUser.uid < targetUid ? `${currentUser.uid}_${targetUid}` : `${targetUid}_${currentUser.uid}`;
            const q = query(collection(db, "private_chats", chatId, "messages"));
            
            privateUnsubscribe = onSnapshot(q, (snapshot) => {
                const pBox = document.getElementById('pop-messages');
                pBox.innerHTML = "";

                let list = [];
                snapshot.forEach(d => list.push(d.data()));
                list.sort((a,b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));

                list.forEach(m => {
                    const d = document.createElement('div');
                    d.className = m.senderId === currentUser.uid ? "pop-msg me" : "pop-msg other";
                    d.innerText = m.text || "";
                    pBox.appendChild(d);
                });
                pBox.scrollTop = pBox.scrollHeight;
            });
        };

        window.closePopChat = function() {
            document.getElementById('pop-private-chat').style.display = 'none';
            if(privateUnsubscribe) privateUnsubscribe();
            currentPrivateChatUserId = null;
        };

        window.sendPopMessage = async function() {
            const inp = document.getElementById('pop-input');
            const txt = inp.value.trim();
            if(!txt || !currentPrivateChatUserId) return;
            inp.value = "";

            const chatId = currentUser.uid < currentPrivateChatUserId ? `${currentUser.uid}_${currentPrivateChatUserId}` : `${currentPrivateChatUserId}_${currentUser.uid}`;
            
            await addDoc(collection(db, "private_chats", chatId, "messages"), {
                text: txt,
                senderId: currentUser.uid,
                timestamp: serverTimestamp()
            });
        };

        // МЕНЮ ОКНА НАСТРОЕК ПРОФИЛЯ
        window.openSettingsModal = async function() {
            const grid = document.getElementById('avatar-grid-container');
            grid.innerHTML = "";
            
            AVATARS_LIST.forEach(url => {
                const img = document.createElement('img');
                img.src = url;
                img.className = "avatar-option";
                if(url === selectedAvatarUrl) img.classList.add('selected');
                
                img.onclick = function() {
                    document.querySelectorAll('.avatar-option').forEach(i => i.classList.remove('selected'));
                    img.classList.add('selected');
                    selectedAvatarUrl = url;
                };
                grid.appendChild(img);
            });

            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            if(userDoc.exists()) {
                const d = userDoc.data();
                document.getElementById('set-nickname').value = d.nickname || "";
                document.getElementById('set-city').value = d.city || "";
                document.getElementById('set-school').value = d.school || "";
                document.getElementById('set-class').value = d.class || "";
                selectedAvatarUrl = d.avatarUrl || DEFAULT_AVATAR;
            }
            document.getElementById('settings-modal').style.display = 'flex';
        };

        window.closeSettingsModal = function() {
            document.getElementById('settings-modal').style.display = 'none';
        };

        window.saveProfileSettings = async function() {
            const nick = document.getElementById('set-nickname').value.trim();
            const city = document.getElementById('set-city').value.trim();
            const school = document.getElementById('set-school').value.trim();
            const cls = document.getElementById('set-class').value.trim();

            if(!nick || !city || !school || !cls) {
                alert("Заполните все текстовые поля перед сохранением!");
                return;
            }

            const btn = document.getElementById('save-settings-btn');
            btn.innerText = "Сохранение...";
            btn.disabled = true;

            try {
                await updateProfile(currentUser, { displayName: nick, photoURL: selectedAvatarUrl });
                await setDoc(doc(db, "users", currentUser.uid), {
                    nickname: nick,
                    avatarUrl: selectedAvatarUrl,
                    city: city,
                    school: school,
                    class: cls
                }, { merge: true });

                alert("Успешно обновлено!");
                closeSettingsModal();
                await fetchAndApplyUserData();
            } catch(e) {
                alert("Ошибка сохранения: " + e.message);
            } finally {
                btn.innerText = "Сохранить";
                btn.disabled = false;
            }
        };
    </script>
